---
# Cloud Foundry deployment manifest for vsp MCP server on SAP BTP.
# Credentials are NOT stored here — set them via:
#   cf set-env vsp-mcp-server SAP_USER "<user>"
#   cf set-env vsp-mcp-server SAP_PASSWORD "<password>"
#   cf set-env vsp-mcp-server VSP_API_KEY "<api-key>"
applications:
  - name: vsp-mcp-server
    docker:
      image: ghcr.io/marianfoo/vsp:latest
    instances: 1
    memory: 256M
    disk_quota: 512M
    health-check-type: http
    health-check-http-endpoint: /health
    env:
      # SAP connection (URL must match Cloud Connector virtual host mapping)
      SAP_URL: "http://a4h-abap:50000"
      SAP_CLIENT: "001"
      SAP_LANGUAGE: "EN"
      SAP_INSECURE: "true"
      # MCP transport (CF sets PORT env var automatically)
      SAP_TRANSPORT: "http-streamable"
      # Tool mode
      SAP_MODE: "focused"
      # Safety: read-only, no SQL, no debugger/HANA/tests
      SAP_READ_ONLY: "true"
      SAP_BLOCK_FREE_SQL: "true"
      SAP_DISABLED_GROUPS: "DHT"
      # Logging
      SAP_VERBOSE: "true"
    services:
      - vsp-connectivity
      - vsp-destination
