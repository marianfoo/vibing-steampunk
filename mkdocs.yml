site_name: vsp — SAP ADT MCP Server
site_description: Enterprise-ready MCP proxy for SAP ABAP Development Tools. Single binary, admin safety controls, works with Claude, Copilot, and all MCP clients.
site_url: https://marianfoo.github.io/vibing-steampunk/
repo_url: https://github.com/marianfoo/vibing-steampunk
repo_name: marianfoo/vibing-steampunk
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: deep orange
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep orange
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Tools Reference: tools.md
  - MCP Usage Guide: mcp-usage.md
  - CLI Guide: cli-guide.md
  - Client Setup:
      - Overview: cli-agents/README.md
      - Español: cli-agents/README_ES.md
      - Русский: cli-agents/README_RU.md
      - Українська: cli-agents/README_UA.md
  - SAP Trial Setup: sap-trial-setup.md
  - Docker: docker.md
  - DSL & Workflows: DSL.md
  - Enterprise Auth: enterprise-auth.md
  - Vision: vision.md
  - Developer Guide: agents.md
  - Reviewer Guide: reviewer-guide.md
  - Architecture Decisions:
      - WebSocket Stateful Debugging: adr/001-websocket-stateful-debugging.md
      - RCA Tooling Architecture: adr/002-rca-tooling-architecture.md
      - ZADT VSP Unified Handler: adr/003-zadt-vsp-apc-unified-handler.md
  - Plans:
      - TAS Debugging: plans/phase5-tas-debugging.md
  - Changelog: changelog.md
  - Roadmap: roadmap.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/marianfoo/vibing-steampunk
